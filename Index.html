<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>K-3 Quality &amp; GMT Performance Dashboard</title>
<meta name="theme-color" content="#0f172a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="K-3 QA"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.19.0/fonts/tabler-icons.min.css"/>
<style>
#splash{position:fixed;inset:0;background:linear-gradient(135deg,#e8edf2 0%,#f4f6f9 50%,#dce3ea 100%);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s ease}
#splash.hide{opacity:0;pointer-events:none}
#splash-icon{width:100px;height:100px;border-radius:22px;background:linear-gradient(135deg,#1d4ed8,#10b981);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 40px rgba(59,130,246,.5);margin-bottom:20px}
#splash-title{font-size:24px;font-weight:800;color:#f1f5f9;letter-spacing:.3px;text-align:center}
#splash-sub{font-size:14px;color:#94a3b8;margin-top:6px;text-align:center}
#splash-bar-wrap{width:220px;height:4px;background:#1e293b;border-radius:2px;margin-top:32px;overflow:hidden}
#splash-bar{height:4px;background:linear-gradient(90deg,#3b82f6,#10b981);border-radius:2px;width:0%;transition:width 3s cubic-bezier(.4,0,.2,1)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0f172a}::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:3000;border-radius:10px;padding:10px 20px;color:#fff;font-size:14px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.5);display:none;white-space:nowrap}
.toast.show{display:block}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:1000;display:none;align-items:center;justify-content:center;padding:12px}
.modal-bg.show{display:flex}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:1rem}
.inp{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:8px 11px;color:#e2e8f0;font-size:14px;width:100%}
.inp:focus{outline:none;border-color:#3b82f6}
.lbl{font-size:11px;color:#94a3b8;margin-bottom:4px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.btn-p{background:#3b82f6;border:none;border-radius:8px;padding:9px 18px;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.btn-g{background:transparent;border:1px solid #334155;border-radius:8px;padding:8px 14px;color:#94a3b8;font-size:12px;cursor:pointer}
.btn-red{background:#ef4444;border:none;border-radius:8px;padding:8px 14px;color:#fff;font-size:12px;cursor:pointer}
#header{background:#1e293b;border-bottom:1px solid #334155;padding:0 .85rem;display:flex;align-items:center;gap:8px;height:52px;position:sticky;top:0;z-index:500}
.hlogo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#1d4ed8,#10b981);display:flex;align-items:center;justify-content:center;flex-shrink:0}
#nav{display:flex;gap:3px;padding:6px .75rem;background:#1e293b;border-bottom:1px solid #334155;flex-wrap:nowrap;overflow-x:auto;position:sticky;top:52px;z-index:499;scrollbar-width:none}
#nav::-webkit-scrollbar{display:none}
.nav-btn{background:transparent;border:1px solid #334155;border-radius:7px;padding:6px 10px;color:#94a3b8;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.nav-btn.active{border-color:#3b82f6;color:#3b82f6;background:rgba(59,130,246,.1)}
.nav-btn.g.active{border-color:#10b981;color:#10b981;background:rgba(16,185,129,.1)}
.nav-btn.o.active{border-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,.1)}
.nav-btn.p.active{border-color:#a855f7;color:#a855f7;background:rgba(168,85,247,.1)}
#main{padding:.75rem;max-width:1000px;margin:0 auto}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
.sc{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:.75rem;text-align:center}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:9px}
.rl{display:flex;flex-direction:column;gap:6px}
.ri{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px .85rem;display:flex;align-items:center;gap:8px;cursor:pointer;transition:border-color .15s}
.ri:hover{border-color:#475569}
.av{width:36px;height:36px;border-radius:50%;background:#0f172a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;overflow:hidden;border:1.5px solid #334155}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.bk{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap}
.st{font-size:11px;color:#64748b;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px}
.dr{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #0f172a;align-items:flex-start}
.bw{background:#0f172a;border-radius:4px;height:7px;overflow:hidden;flex:1;min-width:60px}
.bf{height:7px;border-radius:4px;transition:width .6s ease}
.cpill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent}
textarea.inp{resize:vertical}
@media(max-width:480px){.sg{grid-template-columns:repeat(2,1fr)}.fg{grid-template-columns:1fr 1fr}}
@media(max-width:320px){.fg{grid-template-columns:1fr}}
</style>
</head>

<div class="toast" id="toast"></div>

<div class="modal-bg" id="login-modal">
  <div class="card" style="max-width:290px;width:100%;text-align:center">
    <i class="ti ti-lock" style="font-size:28px;color:#3b82f6;margin-bottom:8px;display:block"></i>
    <p style="font-weight:700;font-size:15px;margin-bottom:3px">Admin Login</p>
    <p style="font-size:12px;color:#64748b;margin-bottom:14px">Password required for edit access</p>
    <input type="password" id="pw-input" class="inp" maxlength="20" placeholder="&bull;&bull;&bull;&bull;" style="text-align:center;letter-spacing:6px;font-size:20px;margin-bottom:5px"/>
    <p id="pw-error" style="font-size:12px;color:#ef4444;margin-bottom:5px;display:none">Wrong password.</p>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:8px">
      <button class="btn-p" onclick="doLogin()">Login</button>
      <button class="btn-g" onclick="closeLogin()">Cancel</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="delete-modal">
  <div class="card" style="max-width:300px;text-align:center">
    <i class="ti ti-trash-x" style="font-size:28px;color:#ef4444;margin-bottom:8px"></i>
    <p style="font-weight:600;margin-bottom:4px">Delete this record?</p>
    <p style="font-size:12px;color:#94a3b8;margin-bottom:16px">Cannot be undone.</p>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn-g" onclick="closeDelModal()">Cancel</button>
      <button class="btn-red" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="detail-modal">
  <div class="card" id="detail-content" style="width:100%;max-width:520px;max-height:90vh;overflow-y:auto"></div>
</div>

<div class="modal-bg" id="photo-modal">
  <div class="card" style="max-width:300px;width:100%;text-align:center">
    <i class="ti ti-camera" style="font-size:26px;color:#10b981;margin-bottom:7px;display:block"></i>
    <p style="font-weight:700;font-size:14px;margin-bottom:3px">Upload Photo</p>
    <p id="photo-name-lbl" style="font-size:12px;color:#64748b;margin-bottom:12px"></p>
    <input type="file" id="photo-file" accept="image/*" style="display:none" onchange="handlePhoto()"/>
    <div id="photo-prev-wrap" style="margin-bottom:12px;display:none">
      <img id="photo-prev" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid #10b981"/>
    </div>
    <button class="btn-p" style="width:100%;margin-bottom:8px" onclick="document.getElementById('photo-file').click()">Choose Photo</button>
    <div style="display:flex;gap:7px">
      <button class="btn-g" style="flex:1" onclick="closePhotoModal()">Cancel</button>
      <button class="btn-p" style="flex:1;background:#10b981" id="save-photo-btn" onclick="savePhoto()" disabled>Save</button>
    </div>
  </div>

<script>
var SK_PH='k3_photos_v1';
var ADMIN='0000';
var GS_URL='https://script.google.com/macros/s/AKfycbxGyBbliot3q642WicEBPFmGk32StwUVwK1QJDh_4yYsZL9rGMG-DsBsINE2yJ5Vltb/exec';
var MC={Pass:'#22c55e',Fail:'#ef4444','Conditional Pass':'#f59e0b','On Hold':'#6366f1'};
var MARKS=['Pass','Fail','Conditional Pass','On Hold'];
var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var CUSTOMERS=['Columbia','M&S','Sainsbury','Dunnes','Uniqlo','GU','Silver Jeans','Other'];
var CTRS=['Bangladesh','China','India','Vietnam','Turkey','Cambodia','Indonesia','Pakistan','Sri Lanka','Myanmar'];
var fiRecs=[],incRecs=[],corRecs=[],photos={};
var isAdmin=false,view='dashboard',editId=null,editType='fi';
var deleteTarget=null,deleteType=null;
var selAuditor=null,selIncharge=null,selController=null,selCustomer='Columbia';
var photoTarget=null,pendingPhoto=null;
try{photos=JSON.parse(localStorage.getItem(SK_PH))||{};}catch(e){photos={};}
function gsRead(sheet,cb){
  var url=GS_URL+'?action=read&sheet='+encodeURIComponent(sheet)+'&t='+Date.now();
  fetch(url).then(function(r){return r.json();}).then(function(d){cb(d.status==='ok'?d.records:[]);}).catch(function(){cb([]);});
}
function gsWrite(sheet,records){
  fetch(GS_URL,{method:'POST',body:JSON.stringify({action:'write',sheet:sheet,records:records||[]})}).catch(function(){});
}
function loadAllFromSheets(cb){
  toast('Syncing data...','ok');
  var done=0;
  function check(){done++;if(done===3){toast('Data loaded!','ok');cb();}}
  gsRead('FI_Records',function(d){fiRecs=d||[];check();});
  gsRead('Incharge_Audits',function(d){incRecs=d||[];check();});
  gsRead('Correlation',function(d){corRecs=d||[];check();});
}
function svFI(){gsWrite('FI_Records',fiRecs);}
function svInc(){gsWrite('Incharge_Audits',incRecs);}
function svCor(){gsWrite('Correlation',corRecs);}
function svPh(){try{localStorage.setItem(SK_PH,JSON.stringify(photos));}catch(e){}}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function tod(){return new Date().toISOString().slice(0,10);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function gv(id){var el=document.getElementById(id);return el?el.value:'';}
function toast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=type==='error'?'#7f1d1d':'#14532d';
  t.style.border='1px solid '+(type==='error'?'#ef4444':'#22c55e');
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2600);
}
function phKey(n){return(n||'').trim().toLowerCase();}
function getPhoto(n){return photos[phKey(n)]||null;}
function avHTML(name,sz,bc){
  sz=sz||36;bc=bc||'#334155';
  var p=getPhoto(name);
  var ini=esc((name||'?').slice(0,2).toUpperCase());
  var fs=sz>50?Math.round(sz*.26):11;
  if(p)return '<div class="av" style="width:'+sz+'px;height:'+sz+'px;border-color:'+bc+'"><img src="'+p+'"/></div>';
  return '<div class="av" style="width:'+sz+'px;height:'+sz+'px;border-color:'+bc+';font-size:'+fs+'px;color:'+bc+'">'+ini+'</div>';
}
setTimeout(function(){document.getElementById('splash-bar').style.width='100%';},150);
setTimeout(function(){document.getElementById('splash').classList.add('hide');},3200);
setTimeout(function(){document.getElementById('splash').style.display='none';},4000);
function toggleAuth(){
  if(isAdmin){isAdmin=false;authUI();setView('dashboard');toast('Logged out.');}
  else{document.getElementById('login-modal').classList.add('show');setTimeout(function(){document.getElementById('pw-input').focus();},100);}
}
function doLogin(){
  if(document.getElementById('pw-input').value===ADMIN){isAdmin=true;closeLogin();authUI();toast('Admin access granted.');}
  else{document.getElementById('pw-error').style.display='block';document.getElementById('pw-input').value='';}
}
function closeLogin(){
  document.getElementById('login-modal').classList.remove('show');
  document.getElementById('pw-input').value='';
  document.getElementById('pw-error').style.display='none';
}
document.getElementById('pw-input').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
function authUI(){
  var b=document.getElementById('auth-btn');
  b.textContent=isAdmin?'Logout':'Admin';
  b.style.color=isAdmin?'#ef4444':'#3b82f6';
  b.style.borderColor=isAdmin?'#7f1d1d':'#1d4ed8';
  document.getElementById('tab-add').style.display=isAdmin?'':'none';
}
authUI();
function askDelete(id,type){deleteTarget=id;deleteType=type;document.getElementById('delete-modal').classList.add('show');}
function closeDelModal(){document.getElementById('delete-modal').classList.remove('show');deleteTarget=null;deleteType=null;}
function confirmDelete(){
  if(!deleteTarget)return;
  if(deleteType==='fi')fiRecs=fiRecs.filter(function(r){return r.id!==deleteTarget;});
  else if(deleteType==='inc')incRecs=incRecs.filter(function(r){return r.id!==deleteTarget;});
  else corRecs=corRecs.filter(function(r){return r.id!==deleteTarget;});
  if(deleteType==='fi')svFI();else if(deleteType==='inc')svInc();else svCor();
  closeDelModal();document.getElementById('detail-modal').classList.remove('show');
  toast('Deleted.');render();
}
function openPhotoModal(name){
  photoTarget=name;pendingPhoto=null;
  document.getElementById('photo-name-lbl').textContent=name;
  document.getElementById('photo-prev-wrap').style.display='none';
  document.getElementById('photo-file').value='';
  document.getElementById('save-photo-btn').disabled=true;
  document.getElementById('photo-modal').classList.add('show');
}
function closePhotoModal(){document.getElementById('photo-modal').classList.remove('show');photoTarget=null;pendingPhoto=null;}
function handlePhoto(){
  var file=document.getElementById('photo-file').files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(e){
    pendingPhoto=e.target.result;
    document.getElementById('photo-prev').src=pendingPhoto;
    document.getElementById('photo-prev-wrap').style.display='block';
    document.getElementById('save-photo-btn').disabled=false;
  };
  r.readAsDataURL(file);
}
function savePhoto(){if(!photoTarget||!pendingPhoto)return;photos[phKey(photoTarget)]=pendingPhoto;svPh();closePhotoModal();toast('Photo saved!');render();}
function removePhoto(name){delete photos[phKey(name)];svPh();toast('Removed.');render();}
function setView(v){
  if(v==='add'&&!isAdmin)return;
  view=v;
  ['dashboard','customer','auditors','incharges','controllers','add'].forEach(function(id){
    var el=document.getElementById('tab-'+id);if(el)el.classList.toggle('active',id===v);
  });
  document.getElementById('export-btn').style.display=(v==='auditors'||v==='incharges'||v==='controllers')?'':'none';
  if(v!=='add')editId=null;
  if(v!=='auditors')selAuditor=null;
  if(v!=='incharges')selIncharge=null;
  if(v!=='controllers')selController=null;
  render();
}
function render(){
  document.getElementById('hdr-count').textContent=fiRecs.length+' FI records';
  var m=document.getElementById('main');
  if(view==='dashboard')m.innerHTML=renderDash();
  else if(view==='customer')m.innerHTML=renderCustomer();
  else if(view==='auditors')m.innerHTML=selAuditor?renderAuditorProfile(selAuditor):renderAuditorList();
  else if(view==='incharges')m.innerHTML=selIncharge?renderInchargeProfile(selIncharge):renderInchargeList();
  else if(view==='controllers')m.innerHTML=selController?renderControllerProfile(selController):renderControllerList();
  else if(view==='add'&&isAdmin)m.innerHTML=renderAddPage();
}
function sCard(icon,color,val,lbl,sub){
  return '<div class="sc"><i class="ti '+icon+'" style="font-size:18px;color:'+color+';margin-bottom:4px;display:block"></i><div style="font-size:22px;font-weight:700;color:#f1f5f9">'+val+'</div><div style="font-size:10px;color:#64748b;margin-top:2px">'+lbl+'</div>'+(sub?'<div style="font-size:11px;color:'+color+';margin-top:3px;font-weight:700">'+sub+'</div>':'')+'</div>';
}
function lgnd(color,label,count,total){
  var pct=total>0?((count/total)*100).toFixed(1):0;
  return '<div style="display:flex;align-items:center;gap:7px;margin-bottom:7px"><div style="width:8px;height:8px;border-radius:50%;background:'+color+';flex-shrink:0"></div><div style="flex:1;font-size:12px;color:#cbd5e1">'+label+'</div><div style="font-size:12px;font-weight:700;color:'+color+'">'+count+'</div><div style="font-size:10px;color:#475569;min-width:36px;text-align:right">('+pct+'%)</div></div>';
}
function donut(pass,fail,cond,hold,total,size){
  size=size||100;
  var R=size/2,stroke=Math.round(size*.1),nr=R-stroke/2,circ=2*Math.PI*nr,off=0;
  function arc(color,count){var len=(count/Math.max(total,1))*circ;var el='<circle cx="'+R+'" cy="'+R+'" r="'+nr+'" fill="none" stroke="'+color+'" stroke-width="'+stroke+'" stroke-dasharray="'+len+' '+(circ-len)+'" stroke-dashoffset="'+(-off)+'" stroke-linecap="butt"/>';off+=len;return el;}
  var pct=total>0?((pass/total)*100).toFixed(1):0;
  var pcol=pct>=80?'#22c55e':pct>=50?'#f59e0b':'#ef4444';
  return '<div style="position:relative;width:'+size+'px;height:'+size+'px;flex-shrink:0"><svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" style="transform:rotate(-90deg)"><circle cx="'+R+'" cy="'+R+'" r="'+nr+'" fill="none" stroke="#1e3a2a" stroke-width="'+stroke+'"/>'+(total>0?arc('#22c55e',pass)+arc('#ef4444',fail)+arc('#f59e0b',cond)+arc('#6366f1',hold):'')+'</svg><div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center"><div style="font-size:'+Math.round(size*.18)+'px;font-weight:700;color:'+pcol+'">'+pct+'%</div><div style="font-size:'+Math.round(size*.09)+'px;color:#64748b">Pass</div></div></div>';
}
function mStat(color,label,val){return '<div style="background:#0f172a;border-radius:8px;padding:8px 10px;text-align:center"><div style="font-size:17px;font-weight:700;color:'+color+'">'+val+'</div><div style="font-size:9px;color:#64748b;margin-top:2px">'+label+'</div></div>';}
function getBuckets(recs,df){
  var now=new Date(),buckets=[];
  for(var i=5;i>=0;i--){
    var d=new Date(now.getFullYear(),now.getMonth()-i,1);
    var key=d.getFullYear()+'-'+(('0'+(d.getMonth()+1)).slice(-2));
    var lbl=MONTHS[d.getMonth()]+"'"+String(d.getFullYear()).slice(2);
    var mr=recs.filter(function(r){return (r[df]||'').slice(0,7)===key;});
    buckets.push({lbl:lbl,total:mr.length,pass:mr.filter(function(r){return r.mark==='Pass'||r.auditResult==='Pass';}).length,fail:mr.filter(function(r){return r.mark==='Fail'||r.auditResult==='Fail';}).length});
  }
  return buckets;
}
function renderBars(buckets){
  var maxM=1;for(var i=0;i<buckets.length;i++){if(buckets[i].total>maxM)maxM=buckets[i].total;}
  var h='<div style="display:flex;align-items:flex-end;gap:7px;height:80px;padding-bottom:2px">';
  for(var j=0;j<buckets.length;j++){
    var b=buckets[j],other=b.total-b.pass-b.fail;
    var hp=b.pass>0?Math.max(Math.round((b.pass/maxM)*66),4):0;
    var hf=b.fail>0?Math.max(Math.round((b.fail/maxM)*66),4):0;
    var ho=other>0?Math.max(Math.round((other/maxM)*66),4):0;
    h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="font-size:9px;color:#64748b;margin-bottom:2px">'+b.total+'</div><div style="width:100%;display:flex;flex-direction:column;justify-content:flex-end;gap:1px">'+(ho?'<div style="height:'+ho+'px;background:#f59e0b;border-radius:2px 2px 0 0"></div>':'')+(hf?'<div style="height:'+hf+'px;background:#ef4444"></div>':'')+(hp?'<div style="height:'+hp+'px;background:#22c55e"></div>':'')+'</div><div style="font-size:9px;color:#64748b;margin-top:3px;text-align:center">'+b.lbl+'</div></div>';
  }
  return h+'</div><div style="display:flex;gap:10px;margin-top:5px"><span style="font-size:10px;color:#64748b"><span style="display:inline-block;width:8px;height:8px;background:#22c55e;border-radius:2px;margin-right:3px"></span>Pass</span><span style="font-size:10px;color:#64748b"><span style="display:inline-block;width:8px;height:8px;background:#ef4444;border-radius:2px;margin-right:3px"></span>Fail</span><span style="font-size:10px;color:#64748b"><span style="display:inline-block;width:8px;height:8px;background:#f59e0b;border-radius:2px;margin-right:3px"></span>Other</span></div>';
}
function fld(label,icon,val,color){
  color=color||'#e2e8f0';
  return '<div class="dr"><i class="ti '+icon+'" style="color:#3b82f6;font-size:13px;margin-top:2px;flex-shrink:0"></i><div style="flex:1"><div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.4px">'+label+'</div><div style="font-size:13px;color:'+color+'">'+esc(val||'')+'</div></div></div>';
}
function heroCard(name,role,color,total,pass,fail,passPct,failPct,extras){
  var photo=getPhoto(name);
  var pcol=passPct>=80?'#22c55e':passPct>=50?'#f59e0b':'#ef4444';
  var h='<div style="background:linear-gradient(135deg,#0d1117,#1e293b 60%);border:1px solid #334155;border-radius:14px;overflow:hidden;margin-bottom:12px"><div style="padding:1rem 1rem 0;position:relative">';
  if(isAdmin){
    h+='<div style="position:absolute;top:10px;right:10px;display:flex;gap:5px"><button class="btn-g" style="font-size:10px;padding:3px 8px;color:'+color+';border-color:'+color+'" onclick="openPhotoModal(\''+esc(name)+'\')"><i class="ti ti-camera"></i> '+(photo?'Change':'Add Photo')+'</button>';
    if(photo)h+='<button class="btn-g" style="font-size:10px;padding:3px 8px;color:#ef4444;border-color:#7f1d1d" onclick="removePhoto(\''+esc(name)+'\')"><i class="ti ti-trash"></i></button>';
    h+='</div>';
  }
  h+='</div><div style="padding:0 1rem 1rem;margin-top:0"><div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">';
  if(photo)h+='<img src="'+photo+'" style="width:120px;height:120px;border-radius:50%;border:3px solid '+color+';object-fit:cover;flex-shrink:0"/>';
  else h+='<div style="width:120px;height:120px;border-radius:50%;border:3px solid '+color+';background:#0f172a;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;color:'+color+';flex-shrink:0">'+esc(name.slice(0,2).toUpperCase())+'</div>';
  h+='<div style="flex:1;min-width:130px;padding-bottom:4px"><div style="font-size:18px;font-weight:800;color:#f1f5f9">'+esc(name)+'</div><div style="font-size:11px;color:#64748b;margin-bottom:7px">'+role+' &middot; '+total+' records</div><div style="display:flex;gap:10px;flex-wrap:wrap"><div style="text-align:center"><div style="font-size:18px;font-weight:700;color:'+pcol+'">'+passPct+'%</div><div style="font-size:9px;color:#64748b">PASS</div></div><div style="text-align:center"><div style="font-size:18px;font-weight:700;color:#22c55e">'+pass+'</div><div style="font-size:9px;color:#64748b">PASSED</div></div><div style="text-align:center"><div style="font-size:18px;font-weight:700;color:#ef4444">'+fail+'</div><div style="font-size:9px;color:#64748b">FAILED</div></div><div style="text-align:center"><div style="font-size:18px;font-weight:700;color:#e2e8f0">'+total+'</div><div style="font-size:9px;color:#64748b">TOTAL</div></div></div></div></div>';
  if(extras)h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px">'+extras+'</div>';
  return h+'</div></div>';
}
function detailModal(html){document.getElementById('detail-content').innerHTML=html;document.getElementById('detail-modal').classList.add('show');}
function renderDash(){
  var total=fiRecs.length,pass=fiRecs.filter(function(r){return r.mark==='Pass';}).length,fail=fiRecs.filter(function(r){return r.mark==='Fail';}).length,cond=fiRecs.filter(function(r){return r.mark==='Conditional Pass';}).length,hold=fiRecs.filter(function(r){return r.mark==='On Hold';}).length;
  var passPct=total>0?((pass/total)*100).toFixed(1):0,failPct=total>0?((fail/total)*100).toFixed(1):0;

function avgCor(r){var vals=[r.s1,r.s2,r.s3,r.s4,r.s5].map(Number).filter(function(v){return !isNaN(v)&&v>0;});if(!vals.length)return null;return(vals.reduce(function(a,b){return a+b;},0)/vals.length).toFixed(1);}
function openCorDetail(id){
  var r=null;for(var i=0;i<corRecs.length;i++){if(corRecs[i].id===id){r=corRecs[i];break;}}if(!r)return;
  var mc=MC[r.mark]||'#e2e8f0';var avg=avgCor(r);
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-weight:700;font-size:15px">Correlation Details</span><button class="btn-g" style="padding:4px 9px" onclick="document.getElementById(\'detail-modal\').classList.remove(\'show\')">X</button></div>';
  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #0f172a">'+avHTML(r.controller,48,'#a855f7')+'<div><div style="font-size:15px;font-weight:700">'+esc(r.controller||'')+'</div><div style="font-size:11px;color:#64748b">Auditor: '+esc(r.auditor||'')+'</div></div><span class="bk" style="margin-left:auto;color:'+mc+';border:1px solid '+mc+';padding:5px 12px">'+esc(r.mark||'')+'</span></div>';
  h+=fld('Date','ti-calendar',r.date)+fld('Style','ti-shirt',r.style)+fld('Color','ti-palette',r.color)+fld('Country','ti-world',r.country)+fld('Controller Findings','ti-clipboard-list',r.defects)+fld('Missing Point','ti-alert-triangle',r.missingPoint,'#fb7185')+fld('Remarks','ti-notes',r.remarks);
  h+='<div style="background:rgba(168,85,247,.07);border:1px solid rgba(168,85,247,.25);border-radius:9px;padding:10px 12px;margin-top:10px"><div style="font-size:10px;color:#a855f7;font-weight:700;text-transform:uppercase;margin-bottom:8px">Correlation Scores</div>';
  var cats=['Measurement Accuracy','Workmanship / Quality','Defect Classification','AQL Judgement','Reporting Accuracy'];
  for(var i=0;i<5;i++){var sv=r['s'+(i+1)],vv=parseFloat(sv),c2=vv>=80?'#22c55e':vv>=50?'#f59e0b':'#ef4444';h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px"><div style="font-size:12px;color:#e2e8f0;flex:1">'+cats[i]+'</div><div style="font-size:13px;font-weight:700;color:'+(isNaN(vv)||!sv?'#64748b':c2)+'">'+(isNaN(vv)||!sv?'--':vv)+'</div></div>';}
  if(avg!==null)h+='<div style="border-top:1px solid rgba(168,85,247,.2);margin-top:5px;padding-top:6px;display:flex;justify-content:space-between"><span style="font-size:12px;color:#94a3b8">Average</span><span style="font-size:14px;font-weight:700;color:#a855f7">'+avg+'</span></div>';
  h+='</div>';
  var scored=parseFloat(r.scored),outOf=parseFloat(r.outOf);
  if(!isNaN(scored)&&!isNaN(outOf)&&outOf>0){var pct2=((scored/outOf)*100).toFixed(1),pc2=pct2>=80?'#22c55e':pct2>=50?'#f59e0b':'#ef4444';h+='<div style="margin-top:8px;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.25);border-radius:9px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:#94a3b8">Score</span><span style="font-size:16px;font-weight:700;color:#ef4444">'+scored+'/'+outOf+' <span style="font-size:12px;color:'+pc2+'">('+pct2+'%)</span></span></div>';}
  if(isAdmin){h+='<div style="display:flex;gap:8px;margin-top:12px"><button class="btn-p" style="background:#a855f7" onclick="startEdit(\''+r.id+'\',\'cor\')"><i class="ti ti-edit"></i> Edit</button><button class="btn-g" style="color:#ef4444;border-color:#7f1d1d" onclick="askDelete(\''+r.id+'\',\'cor\')"><i class="ti ti-trash"></i> Delete</button></div>';}
  detailModal(h);
}
function renderAddPage(){
  var t=editType||'fi';
  var h='<div style="display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap">';
  var types=[['fi','Final Inspection','#3b82f6'],['inc','Incharge Audit','#f59e0b'],['cor','Controller Correlation','#a855f7']];
  types.forEach(function(tp){
    var active=t===tp[0]?';color:'+tp[2]+';border-color:'+tp[2]:'';
    h+='<button onclick="editType=\''+tp[0]+'\';editId=null;render()" class="btn-g" style="font-size:12px'+active+'">'+tp[1]+'</button>';
  });
  h+='</div>';
  if(t==='fi')h+=renderFIForm();else if(t==='inc')h+=renderIncForm();else h+=renderCorForm();
  return h;
}
function fif(label,id,type,ph,val){return '<div><label class="lbl">'+label+'</label><input type="'+type+'" class="inp" id="'+id+'" placeholder="'+ph+'" value="'+esc(val||'')+'" style="font-size:14px"/></div>';}
function renderFIForm(){
  var r=editId?fiRecs.filter(function(x){return x.id===editId;})[0]:null;
  var g=function(k){return r?(r[k]||''):(k==='fiDate'||k==='xfactory'?tod():'');};
  var mOpts='<option value="">Select result</option>';MARKS.forEach(function(m){mOpts+='<option'+(g('mark')===m?' selected':'')+'>'+m+'</option>';});
  var cOpts='<option value="">Select customer</option>';CUSTOMERS.forEach(function(c){cOpts+='<option'+(g('customer')===c?' selected':'')+'>'+c+'</option>';});
  return '<div class="card"><div style="font-weight:700;margin-bottom:12px;font-size:14px;color:#3b82f6"><i class="ti ti-clipboard-check"></i> '+(editId?'Edit':'Final Inspection')+'</div><div class="fg">'+fif('Auditor Name *','fi-auditor','text','Full name',g('auditor'))+'<div><label class="lbl">Customer *</label><select class="inp" id="fi-customer">'+cOpts+'</select></div>'+fif('Style *','fi-style','text','e.g. T-Shirt',g('style'))+fif('Color','fi-color','text','e.g. Navy Blue',g('color'))+fif('Quantity','fi-qty','number','e.g. 1200',g('qty'))+fif('X-Factory Date','fi-xfactory','date','',g('xfactory'))+fif('Sewing/Finishing Line No.','fi-lineNo','text','e.g. Line 3',g('lineNo'))+fif('Final Inspection Date *','fi-fiDate','date','',g('fiDate'))+fif('FI Done By','fi-fiDoneBy','text','Inspector name',g('fiDoneBy'))+'<div><label class="lbl">Result *</label><select class="inp" id="fi-mark">'+mOpts+'</select></div></div><div style="margin-top:10px;background:rgba(251,113,133,.07);border:1px solid rgba(251,113,133,.28);border-radius:9px;padding:11px"><label class="lbl" style="color:#fb7185"><i class="ti ti-alert-triangle"></i> FI Findings / Defects</label><textarea class="inp" id="fi-findings" rows="3" placeholder="List findings..." style="background:rgba(15,23,42,.6);border-color:rgba(251,113,133,.3);color:#fda4af">'+esc(g('findings'))+'</textarea></div><div style="margin-top:9px"><label class="lbl">Remarks</label><textarea class="inp" id="fi-remarks" rows="2" placeholder="Notes...">'+esc(g('remarks'))+'</textarea></div><div style="display:flex;gap:8px;margin-top:12px"><button class="btn-p" onclick="submitFI()">'+(editId?'Save Changes':'Add Record')+'</button><button class="btn-g" onclick="editId=null;setView(\'auditors\')">Cancel</button></div></div>';
}
function renderIncForm(){
  var r=editId?incRecs.filter(function(x){return x.id===editId;})[0]:null;
  var g=function(k){return r?(r[k]||''):(k==='date'?tod():'');};
  var aOpts='<option value="">Select result</option>';['Pass','Fail','Conditional Pass'].forEach(function(m){aOpts+='<option'+(g('auditResult')===m?' selected':'')+'>'+m+'</option>';});
  var atOpts='<option value="">Select type</option>';['Daily Audit','Inline Findings','Customer Visit Findings'].forEach(function(m){atOpts+='<option'+(g('auditType')===m?' selected':'')+'>'+m+'</option>';});
  var cOpts='<option value="">Select customer</option>';CUSTOMERS.forEach(function(c){cOpts+='<option'+(g('customer')===c?' selected':'')+'>'+c+'</option>';});
  return '<div class="card"><div style="font-weight:700;margin-bottom:12px;font-size:14px;color:#f59e0b"><i class="ti ti-user-shield"></i> '+(editId?'Edit':'Incharge Audit')+'</div><div class="fg">'+fif('Incharge Name *','inc-incharge','text','Full name',g('incharge'))+fif('Date *','inc-date','date','',g('date'))+'<div><label class="lbl">Customer</label><select class="inp" id="inc-customer">'+cOpts+'</select></div><div><label class="lbl">Audit Type</label><select class="inp" id="inc-auditType">'+atOpts+'</select></div>'+fif('Line / Section','inc-lineNo','text','e.g. Line 4',g('lineNo'))+fif('Qty Audited','inc-qty','number','e.g. 500',g('qty'))+'<div><label class="lbl">Audit Result *</label><select class="inp" id="inc-auditResult">'+aOpts+'</select></div></div><div style="margin-top:10px;background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.28);border-radius:9px;padding:11px"><label class="lbl" style="color:#fbbf24"><i class="ti ti-building-store"></i> Customer Findings</label><textarea class="inp" id="inc-custFindings" rows="2" placeholder="Customer findings..." style="background:rgba(15,23,42,.6);border-color:rgba(251,191,36,.3);color:#fde68a">'+esc(g('custFindings'))+'</textarea></div><div style="margin-top:9px;background:rgba(167,139,250,.07);border:1px solid rgba(167,139,250,.28);border-radius:9px;padding:11px"><label class="lbl" style="color:#a78bfa"><i class="ti ti-activity"></i> Inline / Line Visiting Findings</label><textarea class="inp" id="inc-inlineFindings" rows="2" placeholder="Inline issues..." style="background:rgba(15,23,42,.6);border-color:rgba(167,139,250,.3);color:#c4b5fd">'+esc(g('inlineFindings'))+'</textarea></div><div style="margin-top:9px"><label class="lbl">Remarks</label><textarea class="inp" id="inc-remarks" rows="2" placeholder="Notes...">'+esc(g('remarks'))+'</textarea></div><div style="display:flex;gap:8px;margin-top:12px"><button class="btn-p" style="background:#f59e0b" onclick="submitInc()">'+(editId?'Save Changes':'Add Record')+'</button><button class="btn-g" onclick="editId=null;setView(\'incharges\')">Cancel</button></div></div>';
}
function renderCorForm(){
  var r=editId?corRecs.filter(function(x){return x.id===editId;})[0]:null;
  var g=function(k){return r?(r[k]||''):(k==='date'?tod():'');};
  var customC=r&&r.country&&CTRS.indexOf(r.country)===-1;
  var ctrOpts='<option value="">Select</option>';CTRS.forEach(function(c){ctrOpts+='<option'+(g('country')===c?' selected':'')+'>'+c+'</option>';});ctrOpts+='<option value="__custom__"'+(customC?' selected':'')+'>Write custom...</option>';
  var mOpts='<option value="">Select mark</option>';MARKS.forEach(function(m){mOpts+='<option'+(g('mark')===m?' selected':'')+'>'+m+'</option>';});
  var scoreHtml='';var cats=['Measurement Accuracy','Workmanship / Quality','Defect Classification','AQL Judgement','Reporting Accuracy'];
  for(var i=0;i<5;i++){scoreHtml+='<div><label class="lbl" style="font-size:10px">'+cats[i]+'</label><input type="number" class="inp" id="cor-s'+(i+1)+'" min="0" max="100" placeholder="0-100" value="'+esc(g('s'+(i+1)))+'" style="color:#ef4444;font-weight:600"></div>';}
  return '<div class="card"><div style="font-weight:700;margin-bottom:12px;font-size:14px;color:#a855f7"><i class="ti ti-git-branch"></i> '+(editId?'Edit':'Controller Correlation')+'</div><div class="fg">'+fif('Controller Name *','cor-controller','text','Controller name',g('controller'))+fif('Auditor Name','cor-auditor','text','Auditor name',g('auditor'))+fif('Style *','cor-style','text','e.g. Jacket',g('style'))+fif('Color','cor-color','text','e.g. Black',g('color'))+'<div><label class="lbl">Country</label><select class="inp" id="cor-country" onchange="tCCor()">'+ctrOpts+'</select><input class="inp" id="cor-customCountry" style="margin-top:5px;display:'+(customC?'block':'none')+'" placeholder="Type country" value="'+(customC?esc(g('country')):'')+'" /></div><div><label class="lbl">Mark *</label><select class="inp" id="cor-mark">'+mOpts+'</select></div>'+fif('Date','cor-date','date','',g('date'))+'</div><div style="margin-top:10px;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.25);border-radius:9px;padding:11px"><label class="lbl" style="color:#fca5a5;margin-bottom:8px">Correlation Scores (0-100)</label><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px">'+scoreHtml+'</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px">'+fif('Scored','cor-scored','number','38',g('scored'))+fif('Out of','cor-outOf','number','50',g('outOf'))+'</div><div style="margin-top:9px"><label class="lbl">Controller Findings</label><input class="inp" id="cor-defects" placeholder="e.g. Stitching, Shade" value="'+esc(g('defects'))+'"/></div><div style="margin-top:9px"><label class="lbl" style="color:#f59e0b">Missing Point</label><input class="inp" id="cor-missingPoint" placeholder="e.g. Label missing" value="'+esc(g('missingPoint'))+'" style="color:#fb7185"/></div><div style="margin-top:9px"><label class="lbl">Remarks</label><textarea class="inp" id="cor-remarks" rows="2" placeholder="Notes...">'+esc(g('remarks'))+'</textarea></div><div style="display:flex;gap:8px;margin-top:12px"><button class="btn-p" style="background:#a855f7" onclick="submitCor()">'+(editId?'Save Changes':'Add Correlation')+'</button><button class="btn-g" onclick="editId=null;setView(\'controllers\')">Cancel</button></div></div>';
}
function tCCor(){var s=document.getElementById('cor-country'),c=document.getElementById('cor-customCountry');if(s&&c)c.style.display=s.value==='__custom__'?'block':'none';}
function submitFI(){
  var auditor=gv('fi-auditor').trim(),style=gv('fi-style').trim(),fiDate=gv('fi-fiDate'),mark=gv('fi-mark');
  if(!auditor||!style||!fiDate||!mark){toast('Auditor, Style, FI Date and Result required.','error');return;}
  var rec={auditor:auditor,customer:gv('fi-customer'),style:style,color:gv('fi-color').trim(),qty:gv('fi-qty').trim(),xfactory:gv('fi-xfactory'),lineNo:gv('fi-lineNo').trim(),fiDate:fiDate,fiDoneBy:gv('fi-fiDoneBy').trim(),mark:mark,findings:gv('fi-findings').trim(),remarks:gv('fi-remarks').trim()};
  if(editId){fiRecs=fiRecs.map(function(r){return r.id===editId?Object.assign({id:editId},rec):r;});toast('Updated.');editId=null;}else{rec.id=gid();fiRecs.unshift(rec);toast('FI record added!');}
  svFI();document.getElementById('add-label').textContent='Add';setView('auditors');
}
function submitInc(){
  var incharge=gv('inc-incharge').trim(),date=gv('inc-date'),auditResult=gv('inc-auditResult');
  if(!incharge||!date||!auditResult){toast('Incharge, date and result required.','error');return;}
  var rec={incharge:incharge,date:date,customer:gv('inc-customer'),auditType:gv('inc-auditType'),lineNo:gv('inc-lineNo').trim(),qty:gv('inc-qty').trim(),auditResult:auditResult,custFindings:gv('inc-custFindings').trim(),inlineFindings:gv('inc-inlineFindings').trim(),remarks:gv('inc-remarks').trim()};
  if(editId){incRecs=incRecs.map(function(r){return r.id===editId?Object.assign({id:editId},rec):r;});toast('Updated.');editId=null;}else{rec.id=gid();incRecs.unshift(rec);toast('Added!');}
  svInc();document.getElementById('add-label').textContent='Add';setView('incharges');
}
function submitCor(){
  var controller=gv('cor-controller').trim(),style=gv('cor-style').trim(),mark=gv('cor-mark');
  if(!controller||!style||!mark){toast('Controller, Style and Mark required.','error');return;}
  var country=gv('cor-country');if(country==='__custom__')country=gv('cor-customCountry').trim();
  var rec={controller:controller,auditor:gv('cor-auditor').trim(),style:style,color:gv('cor-color').trim(),country:country,mark:mark,date:gv('cor-date'),s1:gv('cor-s1'),s2:gv('cor-s2'),s3:gv('cor-s3'),s4:gv('cor-s4'),s5:gv('cor-s5'),scored:gv('cor-scored'),outOf:gv('cor-outOf'),defects:gv('cor-defects').trim(),missingPoint:gv('cor-missingPoint').trim(),remarks:gv('cor-remarks').trim()};
  if(editId){corRecs=corRecs.map(function(r){return r.id===editId?Object.assign({id:editId},rec):r;});toast('Updated.');editId=null;}else{rec.id=gid();corRecs.unshift(rec);toast('Correlation added!');}
  svCor();document.getElementById('add-label').textContent='Add';setView('controllers');
}
function startEdit(id,type){editId=id;editType=type;document.getElementById('detail-modal').classList.remove('show');document.getElementById('add-label').textContent='Edit';setView('add');}
function exportCSV(){
  var cols=['auditor','customer','style','color','qty','xfactory','lineNo','fiDate','fiDoneBy','mark','findings','remarks'];
  var hdrs=['Auditor','Customer','Style','Color','Qty','X-Factory','Line No','FI Date','FI Done By','Result','Findings','Remarks'];
  var rows=[hdrs.join(',')];
  fiRecs.forEach(function(r){rows.push(cols.map(function(c){return '"'+(r[c]||'').replace(/"/g,'""')+'"';}).join(','));});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));
  a.download='fi_records_'+tod()+'.csv';a.click();toast('CSV exported.');
}
loadAllFromSheets(function(){render();});
// Auto-refresh every 60 seconds only when user is not typing
setInterval(function(){
  var active = document.activeElement;
  var isTyping = active && (active.tagName === 'INPUT' || active.tagName === 'SELECT' || active.tagName === 'TEXTAREA');
  if(!isTyping){
    loadAllFromSheets(function(){render();});
  }
},60000);
</script>
